global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: ecommstore

scrape_configs:

  - job_name: storefront-api
    static_configs:
      - targets: ['storefront-api:3001']
    metrics_path: /metrics

  - job_name: admin-api
    static_configs:
      - targets: ['admin-api:3002']
    metrics_path: /metrics

  - job_name: search-lambda
    static_configs:
      - targets: ['search-lambda:3003']
    metrics_path: /metrics

  - job_name: rabbitmq
    static_configs:
      - targets: ['rabbitmq:15692']
    metrics_path: /metrics

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
