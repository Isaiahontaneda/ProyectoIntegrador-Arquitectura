version: '3.8'

# ═══════════════════════════════════════════════════════════
#  EcommStore – Microservices Platform
#  Services: storefront-api | admin-api | search-lambda |
#            notifications-service | api-gateway (Kong)
#  Data:     postgres | redis | rabbitmq
#  Monitoring: prometheus | grafana
# ═══════════════════════════════════════════════════════════

services:

  # ── Data Layer ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB:       storedb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d storedb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI
      - "15692:15692"   # Prometheus metrics
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./infra/rabbitmq_enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Application Layer ──────────────────────────────────
  storefront-api:
    build: ./storefront-api
    container_name: storefront-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file: ./storefront-api/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  admin-api:
    build: ./admin-api
    container_name: admin-api
    restart: unless-stopped
    ports:
      - "3002:3002"
    env_file: ./admin-api/.env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  search-lambda:
    build: ./search-lambda
    container_name: search-lambda
    restart: unless-stopped
    ports:
      - "3003:3003"
    env_file: ./search-lambda/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  notifications-service:
    build: ./notifications-service
    container_name: notifications-service
    restart: unless-stopped
    env_file: ./notifications-service/.env
    depends_on:
      rabbitmq:
        condition: service_healthy

  # ── API Gateway ────────────────────────────────────────
  api-gateway:
    image: kong:3.4
    container_name: api-gateway
    restart: unless-stopped
    environment:
      KONG_DATABASE:          "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG:  /dev/stdout
      KONG_ADMIN_ACCESS_LOG:  /dev/stdout
      KONG_PROXY_ERROR_LOG:   /dev/stderr
      KONG_ADMIN_ERROR_LOG:   /dev/stderr
      KONG_ADMIN_LISTEN:      "0.0.0.0:8001"
      KONG_PLUGINS:           bundled
    ports:
      - "8000:8000"   # Proxy (REST API)
      - "8001:8001"   # Admin API
    volumes:
      - ./api-gateway/kong.yml:/kong/kong.yml:ro
    depends_on:
      storefront-api:
        condition: service_healthy
      admin-api:
        condition: service_healthy
      search-lambda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kong health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Frontend ───────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api-gateway:
        condition: service_healthy

  # ── Monitoring ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d

  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3004:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP:     "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

# ── Volumes ────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:

# ── Networks ───────────────────────────────────────────────
networks:
  default:
    name: ecommstore-net
