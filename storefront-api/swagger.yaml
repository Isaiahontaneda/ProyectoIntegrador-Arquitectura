openapi: 3.0.0
info:
  title: Storefront API
  version: 1.0.0
  description: Customer-facing API — product catalog and order placement

servers:
  - url: http://localhost:8000/store
    description: Via API Gateway (Kong)
  - url: http://localhost:3001
    description: Direct access

tags:
  - name: Products
    description: Product catalog
  - name: Orders
    description: Order management
  - name: Health
    description: Service health checks

paths:

  /health:
    get:
      tags: [Health]
      summary: Service health check
      responses:
        "200":
          description: All dependencies healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  service:  { type: string, example: storefront-api }
                  db:       { type: string, example: ok }
                  redis:    { type: string, example: ok }
                  rabbitmq: { type: string, example: ok }
        "503":
          description: One or more dependencies degraded

  /products:
    get:
      tags: [Products]
      summary: List all products (Redis cached, TTL 60 s)
      parameters:
        - in: query
          name: category
          schema:
            type: string
          description: Filter by category
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

    post:
      tags: [Products]
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /products/{id}:
    get:
      tags: [Products]
      summary: Get a single product by ID (Redis cached, TTL 120 s)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /orders:
    post:
      tags: [Orders]
      summary: Place a new order
      description: |
        Flow: validate stock → call Payment Gateway (Stripe mock) → atomic stock
        deduction (row-level lock) → publish RabbitMQ events.

        **Test payment tokens:**
        - `tok_visa` — success
        - `tok_chargeDeclined` — card declined
        - `tok_insufficientFunds` — insufficient funds
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
            example:
              product_id: 1
              quantity: 2
              customer_email: cliente@email.com
              payment_method_id: tok_visa
      responses:
        "201":
          description: Order placed and payment confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Insufficient stock or validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:     { type: string }
                  available: { type: integer }
        "402":
          description: Payment declined
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:        { type: string }
                  payment_code: { type: string }
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    get:
      tags: [Orders]
      summary: List orders
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, confirmed, shipped, delivered, cancelled]
          description: Filter by order status
      responses:
        "200":
          description: Order list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      tags: [Orders]
      summary: Get order by ID (includes product name)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  schemas:

    Product:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Laptop Pro
        description:
          type: string
          example: High-performance laptop
        category:
          type: string
          example: Computadoras
        price:
          type: number
          example: 1299.99
        stock:
          type: integer
          example: 50
        created_at:
          type: string
          format: date-time

    ProductInput:
      type: object
      required: [name, price]
      properties:
        name:
          type: string
          example: Wireless Mouse
        description:
          type: string
        category:
          type: string
          default: general
        price:
          type: number
          example: 29.99
        stock:
          type: integer
          default: 0

    Order:
      type: object
      properties:
        id:
          type: integer
        product_id:
          type: integer
        quantity:
          type: integer
        status:
          type: string
          example: completed
        customer_email:
          type: string
          example: cliente@email.com
        total_price:
          type: number
          example: 2599.98
        payment_intent_id:
          type: string
          example: pi_mock_abc123_def456
        payment_status:
          type: string
          enum: [pending, succeeded, failed]
          example: succeeded
        payment_method:
          type: string
          example: tok_visa
        created_at:
          type: string
          format: date-time

    OrderInput:
      type: object
      required: [product_id, quantity]
      properties:
        product_id:
          type: integer
          example: 1
        quantity:
          type: integer
          example: 2
        customer_email:
          type: string
          example: cliente@email.com
        payment_method_id:
          type: string
          example: tok_visa
          description: "Payment token: tok_visa (success), tok_chargeDeclined (failure)"

    Error:
      type: object
      properties:
        error:
          type: string
          example: Product not found
